<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sichuan AI Receptionist</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:white;
}

.card{
  width:420px;
  padding:40px;
  text-align:center;
  background:#111827;
  border-radius:24px;
  border:1px solid #1f2937;
}

.logo{
  font-size:60px;
}

h1{
  margin-top:15px;
}

p{
  margin-top:10px;
  color:#cbd5e1;
  line-height:1.6;
}

button{
  margin-top:30px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#dc2626;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">🍜</div>

<h1>Sichuan AI Assistant</h1>

<p>
Talk with our AI receptionist for reservations,
takeaway orders, menu recommendations and restaurant information.
</p>

<button id="startAssistant">
🎤 Talk to AI Assistant
</button>

</div>

<!-- Vapi Widget -->

<script
src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
defer
async>
</script>

<script>
window.addEventListener('load', () => {

  window.vapiSDK.run({
    apiKey: 'c961ad66-2e76-4c83-8636-e8613fa590ee',
    assistant: '9731ad15-4ba6-47d2-b925-1f5fa0d8bdfb',
    config: {
      position: 'bottom-right'
    }
  });

});
</script>

</body>
</html>
